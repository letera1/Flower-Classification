# Flower Classification - Configuration
# =====================================

# Data Configuration
data:
  raw_data_path: "backend/data/raw"
  processed_data_path: "backend/data/processed"
  test_size: 0.2
  val_size: 0.1
  random_state: 42
  target_column: "species"

# Feature Configuration
features:
  numeric_features:
    - "sepal_length"
    - "sepal_width"
    - "petal_length"
    - "petal_width"
  scaling: "standard"  # standard, minmax, robust

# Model Configuration
models:
  # Model selection: logistic_regression, decision_tree, random_forest, xgboost
  primary: "random_forest"
  
  logistic_regression:
    max_iter: 1000
    solver: "lbfgs"
    multi_class: "multinomial"
    
  decision_tree:
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1
    
  random_forest:
    n_estimators: 100
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1
    n_jobs: -1
    
  xgboost:
    n_estimators: 100
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8

# Hyperparameter Tuning
tuning:
  enabled: true
  cv_folds: 5
  scoring: "accuracy"
  n_jobs: -1
  param_grid:
    random_forest:
      n_estimators: [50, 100, 200]
      max_depth: [5, 10, 20, null]
      min_samples_split: [2, 5]
      min_samples_leaf: [1, 2]

# Training
training:
  batch_size: 32
  epochs: 100
  early_stopping: true
  patience: 10

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  reload: true
  workers: 1
  title: "Flower Classification API"
  version: "1.0.0"

# Model Artifacts
artifacts:
  save_dir: "backend/models/artifacts"
  save_format: "joblib"
  save_best_only: true

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "backend/logs/app.log"
